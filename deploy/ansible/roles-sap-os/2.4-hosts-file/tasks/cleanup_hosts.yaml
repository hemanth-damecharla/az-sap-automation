---
# tasks/cleanup_hosts.yaml
# Removes duplicate entries and validates hosts file

- name: "Read current hosts file"
  ansible.builtin.slurp:
    src: "/etc/hosts"
  register: hosts_content

- name: "Get unique lines"
  ansible.builtin.set_fact:
    unique_lines: "{{ (hosts_content['content'] | b64decode).split('\n') | unique | list }}"

- name: "Convert line counts to integers"
  ansible.builtin.set_fact:
    original_line_count: "{{ (hosts_content['content'] | b64decode).split('\n') | length | int }}"
    unique_line_count: "{{ unique_lines | length | int }}"

- name: "Calculate difference"
  ansible.builtin.set_fact:
    removed_count: "{{ original_line_count - unique_line_count }}"

- name: "Update hosts file if duplicates found"
  ansible.builtin.copy:
    dest: "/etc/hosts"
    content: "{{ unique_lines | join('\n') }}"
    mode: "0644"
    backup: true
  when: removed_count > 0

- name: "Report cleanup results"
  ansible.builtin.debug:
    msg: 
      - "Original lines: {{ original_line_count }}"
      - "After deduplication: {{ unique_line_count }}"
      - "Duplicates removed: {{ removed_count }}"
  when: removed_count > 0