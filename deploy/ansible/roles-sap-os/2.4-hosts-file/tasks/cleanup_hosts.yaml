---
# tasks/cleanup_hosts.yaml
# Removes duplicate entries and validates hosts file

- name: "2.4 Hosts: - Read current hosts file"
  ansible.builtin.slurp:
    src: "/etc/hosts"
  register: hosts_content

- name: "Get unique lines"
  ansible.builtin.set_fact:
    unique_lines: "{{ (hosts_content['content'] | b64decode).split('\n') | unique | list }}"

- name: "Get line counts"
  ansible.builtin.set_fact:
    line_counts:
      original: "{{ (hosts_content['content'] | b64decode).split('\n') | length | int }}"
      unique: "{{ unique_lines | length | int }}"

- name: "Calculate removed entries"
  ansible.builtin.set_fact:
    removed_count: "{{ line_counts.original | int - line_counts.unique | int }}"

- name: "Debug cleanup details"
  ansible.builtin.debug:
    msg:
      - "Processing /etc/hosts file:"
      - "  - Original line count: {{ line_counts.original }}"
      - "  - Unique line count: {{ line_counts.unique }}"
      - "  - Duplicate lines found: {{ removed_count }}"
  when: removed_count > 0

- name: "Update hosts file if duplicates found"
  ansible.builtin.copy:
    dest: "/etc/hosts"
    content: "{{ unique_lines | join('\n') }}"
    mode: "0644"
    backup: true
    validate: "/usr/sbin/getent hosts %s"
  when: removed_count > 0

- name: "Report cleanup results"
  ansible.builtin.debug:
    msg:
      - "Hosts file cleanup completed:"
      - "  - Original entries: {{ line_counts.original }}"
      - "  - Final entries: {{ line_counts.unique }}"
      - "  - Duplicates removed: {{ removed_count }}"
  when: removed_count > 0
