---
# tasks/ha_hosts.yaml
# Handles High Availability host entries for SAP systems

- name: "Validate required variables for HA"
  ansible.builtin.assert:
    that:
      - sap_sid is defined
      - sap_fqdn is defined
      - scs_instance_number is defined
      - ers_instance_number is defined
    fail_msg: "Missing required base variables for HA configuration"

- name: "Validate HA specific variables"
  ansible.builtin.assert:
    that:
      - scs_lb_ip is defined
      - ers_lb_ip is defined
    fail_msg: "Missing load balancer IPs for HA configuration"
  when: scs_high_availability

- name: "Generate ASCS/ERS virtual hostnames"
  ansible.builtin.set_fact:
    ha_hostnames: "{{ ha_hostnames | default({}) | combine({
      'scs': custom_scs_virtual_hostname | default(sap_sid | lower + 'ascs' + scs_instance_number + 'cl1'),
      'ers': custom_ers_virtual_hostname | default(sap_sid | lower + 'ers' + ers_instance_number + 'cl2')
    }) }}"
  when: scs_high_availability

- name: "Generate DB virtual hostname"
  ansible.builtin.set_fact:
    ha_hostnames: "{{ ha_hostnames | default({}) | combine({
      'db': custom_db_virtual_hostname | default(sap_sid | lower + db_sid | lower + 'db' + db_instance_number + 'cl')
    }) }}"
  when: database_high_availability

- name: "Debug generated hostnames"
  ansible.builtin.debug:
    msg:
      - "ASCS Virtual Hostname: {{ ha_hostnames.scs | default('NOT SET') }}"
      - "ERS Virtual Hostname: {{ ha_hostnames.ers | default('NOT SET') }}"
      - "DB Virtual Hostname: {{ ha_hostnames.db | default('NOT SET') }}"
  when: scs_high_availability or database_high_availability

# Create host entries using format_host_entry filter
- name: "Create HA ASCS/ERS entries"
  ansible.builtin.blockinfile:
    path: "/etc/hosts"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - HA {{ sap_sid | upper }}"
    block: |
      {{ scs_lb_ip | format_host_entry(ha_hostnames.scs, sap_fqdn) }}
      {{ ers_lb_ip | format_host_entry(ha_hostnames.ers, sap_fqdn) }}
    state: present
    backup: true
  when: 
    - scs_high_availability
    - ha_hostnames.scs is defined
    - ha_hostnames.ers is defined

- name: "Create HA DB entries"
  ansible.builtin.blockinfile:
    path: "/etc/hosts"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - HA DB {{ sap_sid | upper }}"
    block: |
      {{ database_loadbalancer_ip | format_host_entry(ha_hostnames.db, sap_fqdn) }}
    state: present
    backup: true
  when: 
    - database_high_availability
    - database_loadbalancer_ip is defined
    - ha_hostnames.db is defined

# Verify entries
- name: "Verify HA entries existence"
  ansible.builtin.shell: "grep -E '{{ item }}' /etc/hosts"
  register: ha_verify
  changed_when: false
  failed_when: ha_verify.rc != 0
  with_items:
    - "{{ ha_hostnames.scs | default('') }}"
    - "{{ ha_hostnames.ers | default('') }}"
    - "{{ ha_hostnames.db | default('') }}"
  when: item != ''