---
# tasks/ha_hosts.yaml
# Handles High Availability host entries for SAP systems

- name: "Validate required variables for HA"
  ansible.builtin.assert:
    that:
      - sap_sid is defined
      - sap_fqdn is defined
      - scs_instance_number is defined
      - ers_instance_number is defined
    fail_msg: "Missing required variables for HA configuration"

- name: "Set cluster hostnames"
  ansible.builtin.set_fact:
    cluster_hostnames:
      scs: "{{ sap_sid | lower }}scs00cl1"
      ers: "{{ sap_sid | lower }}ers01cl2"
      db: "{{ sap_sid | lower }}{{ db_sid | lower }}db00cl"
  when: scs_high_availability or database_high_availability

# Create HA host entries
- name: "Create cluster entries"
  ansible.builtin.blockinfile:
    path: "/etc/hosts"
    marker: "# {mark} ASCS/ERS Entries {{ cluster_hostnames.scs }}"
    block: |
      {{ scs_lb_ip }}        {{ cluster_hostnames.scs }}.{{ sap_fqdn }}                                                {{ cluster_hostnames.scs }}          
      {{ ers_lb_ip }}        {{ cluster_hostnames.ers }}.{{ sap_fqdn }}                                                {{ cluster_hostnames.ers }}          
    state: present
    backup: true
  when: scs_high_availability

- name: "Create DB cluster entry"
  ansible.builtin.blockinfile:
    path: "/etc/hosts"
    marker: "# {mark} DB Entries {{ cluster_hostnames.db }}"
    block: |
      {{ database_loadbalancer_ip }}        {{ cluster_hostnames.db }}.{{ sap_fqdn }}                                               {{ cluster_hostnames.db }}     
    state: present
    backup: true
  when: database_high_availability
