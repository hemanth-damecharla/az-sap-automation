---
# tasks/ha_hosts.yaml

- name: "Validate required variables for HA"
  ansible.builtin.assert:
    that:
      - scs_lb_ip is defined
      - ers_lb_ip is defined
      - sap_sid is defined
      - sap_fqdn is defined
      - scs_instance_number is defined
      - ers_instance_number is defined
    fail_msg: "Missing required variables for HA configuration"
  when: scs_high_availability

- name: "Create virtual hostnames for HA components"
  ansible.builtin.set_fact:
    ha_hostnames: {}
  when: scs_high_availability

- name: "Set SCS/ERS virtual hostnames"
  ansible.builtin.set_fact:
    ha_hostnames: "{{ ha_hostnames | combine({
      'scs': custom_scs_virtual_hostname | default(sap_sid | generate_hostname('scs', scs_instance_number, ha_enabled=true)),
      'ers': custom_ers_virtual_hostname | default(sap_sid | generate_hostname('ers', ers_instance_number, ha_enabled=true))
    }) }}"
  when: scs_high_availability

- name: "Set DB virtual hostname"
  ansible.builtin.set_fact:
    ha_hostnames: "{{ ha_hostnames | combine({
      'db': custom_db_virtual_hostname | default(sap_sid | generate_hostname('db', db_instance_number, ha_enabled=true))
    }) }}"
  when: database_high_availability

- name: "Create HA SCS/ERS entries"
  ansible.builtin.blockinfile:
    path: "/etc/hosts"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - HA {{ sap_sid | upper }}"
    block: |
      {% if scs_lb_ip is defined and ha_hostnames.scs is defined %}
      {{ scs_lb_ip | format_host_entry(ha_hostnames.scs, sap_fqdn) }}
      {% endif %}
      {% if ers_lb_ip is defined and ha_hostnames.ers is defined %}
      {{ ers_lb_ip | format_host_entry(ha_hostnames.ers, sap_fqdn) }}
      {% endif %}
    state: present
  when: scs_high_availability

- name: "Create HA DB entries"
  ansible.builtin.blockinfile:
    path: "/etc/hosts"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - HA DB {{ sap_sid | upper }}"
    block: |
      {{ database_loadbalancer_ip | format_host_entry(ha_hostnames.db, sap_fqdn) }}
    state: present
  when: 
    - database_high_availability
    - database_loadbalancer_ip is defined
    - ha_hostnames.db is defined