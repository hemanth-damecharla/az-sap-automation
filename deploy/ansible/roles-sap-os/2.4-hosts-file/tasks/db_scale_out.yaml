---
# tasks/db_scale_out.yaml
# Handles database scale-out scenarios for SAP HANA systems
- name: "Validate scale-out variables"
  ansible.builtin.assert:
    that:
      - sap_sid is defined
      - sap_fqdn is defined
      - db_instance_number is defined
      - platform == 'HANA'
      - subnet_cidr_storage is defined
      - subnet_cidr_db is defined
    fail_msg: "Missing required variables for database scale-out configuration"

- name: "Get DB group hosts"
  ansible.builtin.set_fact:
    db_hosts: "{{ groups[sap_sid | upper + '_DB'] | default([]) }}"

- name: "Set subnet information"
  ansible.builtin.set_fact:
    subnet_info:
      hsr: "{{ subnet_cidr_db }}"
      internal: "{{ subnet_cidr_storage }}"

- name: "Set DB suffixes based on configuration"
  ansible.builtin.set_fact:
    db_suffixes:
      replication: "{{ '-hsr' if database_high_availability else '-db' }}"
      internal: "{{ '-inter' if database_high_availability else '-storage' }}"

- name: "Create DB network entries"
  ansible.builtin.blockinfile:
    path: "/etc/hosts"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - DB NETWORK {{ sap_sid | upper }}"
    block: |
      {% for host in db_hosts %}
      {% if hostvars[host].ipadd is defined and hostvars[host].ipadd | length > 1 %}
      {# System Replication Network #}
      {% set hsr_ip = hostvars[host].ipadd | get_tier_ip(subnet_cidr=subnet_info.hsr) %}
      {% if hsr_ip %}
      {{ hsr_ip | format_host_entry(host + db_suffixes.replication, sap_fqdn) }}
      {% endif %}
      
      {# Internal Communication Network #}
      {% set inter_ip = hostvars[host].ipadd | get_tier_ip(subnet_cidr=subnet_info.internal) %}
      {% if inter_ip %}
      {{ inter_ip | format_host_entry(host + db_suffixes.internal, sap_fqdn) }}
      {% endif %}
      {% endif %}
      {% endfor %}
    state: present
    backup: true
  when: not database_high_availability
    
    # Each DB host should have both entries
    expected_count={{ db_hosts | length }}
    
    if [ $hsr_count -ne $expected_count ] || [ $inter_count -ne $expected_count ]; then
      echo "Missing entries: Expected $expected_count of each, found HSR: $hsr_count, Internal: $inter_count"
      exit 1
    fi
  changed_when: false
  when: 
    - not database_high_availability
    - db_hosts | length > 0