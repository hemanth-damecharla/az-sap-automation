---
# tasks/db_scale_out.yaml

- name: "Set scale-out hostname"
  ansible.builtin.set_fact:
    db_so_virtual_hostname: "{{ custom_db_virtual_hostname | default(sap_sid | generate_hostname('db_so', db_instance_number)) }}"

- name: "Get primary DB node"
  ansible.builtin.set_fact:
    primary_db_host: "{{ groups[sap_sid | upper + '_DB'][0] }}"

- name: "Get primary DB IP"
  ansible.builtin.set_fact:
    primary_db_ip: "{{ hostvars[primary_db_host].ipadd | get_tier_ip(subnet_cidr=subnet_cidr_client) | default(hostvars[primary_db_host].ipadd | get_tier_ip(0)) }}"

- name: "Create scale-out entries"
  ansible.builtin.blockinfile:
    path: "/etc/hosts"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - DB SCALE-OUT {{ sap_sid | upper }}"
    block: |
      {{ primary_db_ip | format_host_entry(db_so_virtual_hostname, sap_fqdn) }}
      
      {% for host in groups[sap_sid | upper + '_DB'] %}
      {% set host_ips = hostvars[host].ipadd %}
      {% if host_ips | length > 1 %}
      {# Get storage network IP #}
      {% set storage_ip = host_ips | get_tier_ip(subnet_cidr=subnet_cidr_storage) %}
      {% if storage_ip %}
      {{ storage_ip | format_host_entry(host + '-storage', sap_fqdn) }}
      {% endif %}
      
      {# Get DB network IP #}
      {% set db_ip = host_ips | get_tier_ip(subnet_cidr=subnet_cidr_db) %}
      {% if db_ip %}
      {{ db_ip | format_host_entry(host + '-db', sap_fqdn) }}
      {% endif %}
      {% endif %}
      {% endfor %}
    state: present
  when: not database_high_availability